<table class="table  table-bordered table-sm">
    <thead>
        <tr>
            <th scope="col">Serial</th>

            @for (column of columnList(); track $index) {
            <th scope="col">{{ column }}</th>
            }
        </tr>
    </thead>
    <tbody>
        @for(row of tableData(); track $index){
        <tr>
            <th scope="row">{{ $index + 1 }}</th>
            @for(column of columnList(); track $index){
            <td>{{ row[column] }}</td>
            }
        </tr>
        }
    </tbody>
</table>
